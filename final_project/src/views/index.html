<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>

  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
</head>

<body style="font-family: Arial, sans-serif; background:#f4f6f8; margin:0;">

  <div style="max-width:800px; margin:40px auto; padding:0 20px;">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">

      <div style="display:flex; justify-content:space-between; gap:10px">
        <h1 style="margin:0; font-size:24px;">My Posts</h1>
        <h1 style="margin:0; font-size:24px; color: #858585; cursor: pointer;" onclick="window.location.href = '/users'">Users</h1>
      </div>


      <div style="display:flex; gap:10px;">
        <button onclick="openCreateDialog()"
          style="border:none; border-radius:6px; padding:8px 12px; cursor:pointer; background:#4CAF50; color:white; display:flex; align-items:center; gap:6px;">
          <i class="fi fi-rr-plus"></i> Create
        </button>


        <button
          style="border:none; border-radius:6px; padding:8px 12px; cursor:pointer; background:#072168; color:white; display:flex; align-items:center; gap:6px;">
          <i class="fi fi-rr-letter-case"></i>
          Order Alphabetically</button>

        <button onclick="logout()"
          style="border:none; border-radius:6px; padding:8px 12px; cursor:pointer; background:#e0e0e0; color:#333; display:flex; align-items:center; gap:6px;">
          <i class="fi fi-rr-sign-out"></i> Logout
        </button>

      </div>
    </div>

    <div id="posts" style="display:flex; flex-direction:column; gap:15px;">
    </div>

    <dialog id="createDialog"
      style="border:none; border-radius:12px; padding:0; width:100%; max-width:400px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">

      <div style="padding:20px; display:flex; flex-direction:column; gap:15px;">
        <h2 style="margin:0; font-size:20px;">Create a Post</h2>
        <form onsubmit="event.preventDefault(); savePost();" style="display:flex; flex-direction:column; gap:12px;">
          <div style="display:flex; flex-direction:column; gap:5px;">
            <label for="title" style="font-size:14px; color:#555;">Title</label>
            <input type="text" id="title" name="title" required
              style="padding:10px; border-radius:6px; border:1px solid #ccc; font-size:14px; outline:none;">
          </div>
          <div style="display:flex; flex-direction:column; gap:5px;">
            <label for="content" style="font-size:14px; color:#555;">Content</label>
            <textarea id="content" name="content" required rows="4"
              style="padding:10px; border-radius:6px; border:1px solid #ccc; font-size:14px; resize:none; outline:none;"></textarea>
          </div>
          <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
            <button type="button" onclick="document.getElementById('createDialog').close()"
              style="background:#e0e0e0; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;">
              Cancel
            </button>
            <button type="submit"
              style="background:#4CAF50; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;">
              Save
            </button>
          </div>
        </form>
      </div>
    </dialog>

    <dialog id="updateDialog"
      style="border:none; border-radius:12px; padding:0; width:100%; max-width:400px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">

      <div style="padding:20px; display:flex; flex-direction:column; gap:15px;">
        <h2 style="margin:0; font-size:20px;">Update a Post</h2>
        <form onsubmit="event.preventDefault(); editPost();" style="display:flex; flex-direction:column; gap:12px;">
          <div style="display:flex; flex-direction:column; gap:5px;">
            <label for="titleUpdate" style="font-size:14px; color:#555;">Title</label>
            <input type="text" id="titleUpdate" name="titleUpdate" required
              style="padding:10px; border-radius:6px; border:1px solid #ccc; font-size:14px; outline:none;">
          </div>
          <div style="display:flex; flex-direction:column; gap:5px;">
            <label for="contentUpdate" style="font-size:14px; color:#555;">Content</label>
            <textarea id="contentUpdate" name="contentUpdate" required rows="4"
              style="padding:10px; border-radius:6px; border:1px solid #ccc; font-size:14px; resize:none; outline:none;"></textarea>
          </div>
          <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
            <button type="button" onclick="document.getElementById('updateDialog').close()"
              style="background:#e0e0e0; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;">
              Cancel
            </button>
            <button type="submit"
              style="background:#4CAF50; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;">
              Save
            </button>
          </div>
        </form>
      </div>
    </dialog>

  </div>

  <script>
    const token = localStorage.getItem("token");
    let allPosts = [];

    // FETCH POSTS
    fetch('/api/v1.0/posts', {
      headers: {
        Authorization: `Bearer ${token}`
      }
    })
      .then(res => {
        if (!res.ok) throw new Error("Unauthorized");
        return res.json();
      })
      .then(posts => {
        allPosts = posts;
        const container = document.getElementById('posts');

        if (posts.length === 0) {
          container.innerHTML = "<p style='text-align:center; color:#777; margin-top:40px;'>No posts yet</p>";
          return;
        }

        posts.forEach(post => {
          const div = document.createElement('div');
          div.style = "background:white; padding:20px; border:1px solid #ddd; border-radius:6px;";

          div.innerHTML = `
            <h3 style="margin:0 0 10px;">${post.title}</h3>
            <p style="color:#555; font-size:14px;">${post.content}</p>

            <div style="margin-top:15px; display:flex; gap:10px;">
              <button onclick="openUpdateDialog(${post.id})"
                style="border:none; border-radius:6px; padding:6px 10px; cursor:pointer; background:#e0e0e0; display:flex; align-items:center; gap:6px;">
                <i class="fi fi-rr-edit"></i> Edit
              </button>

              <button onclick="deletePost(${post.id})"
                style="border:none; border-radius:6px; padding:6px 10px; cursor:pointer; background:#f44336; color:white; display:flex; align-items:center; gap:6px;">
                <i class="fi fi-rr-trash"></i> Delete
              </button>
            </div>
          `;
          container.appendChild(div);
        });
      })
      .catch(err => {
        console.error(err);
      });

    function openCreateDialog() {
      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
      document.getElementById('createDialog').showModal();
    }

    function openUpdateDialog(id) {
      const dialog = document.getElementById('updateDialog');

      const post = allPosts.find(p => p.id === id);

      if (post) {
        dialog.dataset.id = post.id;
        document.getElementById('titleUpdate').value = post.title;
        document.getElementById('contentUpdate').value = post.content;
        dialog.showModal();
      } else {
        console.error("Post not found");
      }
    }

    async function deletePost(id) {
      const confirmDelete = confirm("Delete this post?");
      if (!confirmDelete) return;

      await fetch(`/api/v1.0/posts/${id}`, {
        method: "DELETE",
        headers: {
          Authorization: `Bearer ${token}`
        }
      });
      location.reload();
    }

    // LOGOUT
    function logout() {
      localStorage.removeItem("token");
      window.location.href = "/";
    }

    // SAVE NEW POST
    async function savePost() {
      const title = document.getElementById("title").value;
      const content = document.getElementById("content").value;

      const res = await fetch('/api/v1.0/posts', {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ title, content })
      });

      if (res.ok) {
        document.getElementById('createDialog').close();
        location.reload();
      }
    }

    // EDIT POST
    async function editPost() {
      const dialog = document.getElementById('updateDialog');
      const id = dialog.dataset.id;

      const title = document.getElementById("titleUpdate").value;
      const content = document.getElementById("contentUpdate").value;

      const res = await fetch(`/api/v1.0/posts/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ title, content })
      });

      if (res.ok) {
        dialog.close();
        location.reload();
      }
    }
  </script>

</body>

</html>
