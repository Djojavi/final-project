<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            padding: 30px;
            border-radius: 6px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #ddd;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 22px;
            text-align: center;
        }

        p {
            margin: 0 0 20px;
            font-size: 14px;
            text-align: center;
            color: #666;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 13px;
            color: #444;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input:focus {
            outline: none;
            border-color: #888;
        }

        .btn-login {
            width: 100%;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-login:hover {
            background-color: #222;
        }

        .footer-links {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
        }

        .footer-links a {
            color: #333;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
    
</head>

<body>

    <div class="login-card">
        <h2>Blogram</h2>
        <p>Welcome!</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="ejemplo@correo.com"  name="email" required>
            </div>

            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="John" name="firstName" required>
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="Doe" name="lastName" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" name="password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="••••••••" name="confirmPassword" required>
            </div>

            <button class="btn-login">Sign up</button>
        </form>

        <div class="footer-links">
            <p onclick="window.location.href= '/'" style="cursor: pointer;">I already have an account</p>
        </div>
    </div>

    <script>
        const form = document.getElementById("loginForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = form.querySelector("input[name='email']").value;
            const firstName = form.querySelector("input[name='firstName']").value;
            const lastName = form.querySelector("input[name='lastName']").value;
            const password = form.querySelector("input[name='password']").value;
            const confirmPassword = form.querySelector("input[name='confirmPassword']").value;

            if(password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            try {
                const res = await fetch("http://localhost:3000/api/v1.0/users", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ email, firstName, lastName, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.error || "Sign up failed");
                    return;
                }

                localStorage.setItem("token", data.token);

                window.location.href = "/home";

            } catch (err) {
                console.error(err);
                alert("Something went wrong");
            }
        });
    </script>

</body>

</html>
