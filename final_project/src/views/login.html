<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            padding: 30px;
            border-radius: 6px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #ddd;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 22px;
            text-align: center;
        }

        p {
            margin: 0 0 20px;
            font-size: 14px;
            text-align: center;
            color: #666;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 13px;
            color: #444;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input:focus {
            outline: none;
            border-color: #888;
        }

        .btn-login {
            width: 100%;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-login:hover {
            background-color: #222;
        }

        .footer-links {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
        }

        .footer-links a {
            color: #333;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2>Blogram</h2>
    <p>Welcome back!</p>

    <form>
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>

        <button class="btn-login">Log in</button>
    </form>

    <div class="footer-links">
        <a href="#">Create account</a>
    </div>
</div>

</body>
</html>
